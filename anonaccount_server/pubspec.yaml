name: anonaccount_server
description: AnonAccount - Anonymous identity module with ECDSA P-256 cryptographic authentication, multi-device support, and zero-PII architecture for Serverpod applications.
version: 0.1.0
homepage: https://github.com/your-org/serverpod_anonaccred
repository: https://github.com/your-org/serverpod_anonaccred

publish_to: 'https://pub.dev'

topics:
  - serverpod
  - authentication
  - privacy
  - cryptography
  - anonymous

platforms:
  linux:
  macos:
  windows:

environment:
  sdk: '^3.8.0'

dependencies:
  serverpod: 3.4.1
  serverpod_auth_idp_server: 3.4.1
  pointycastle: ^4.0.0
  crypto: ^3.0.3

dev_dependencies:
  lints: '>=3.0.0 <7.0.0'
  serverpod_test: 3.4.1
  test: ^1.25.5
  webcrypto: ^0.5.3
