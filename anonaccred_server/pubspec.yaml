name: anonaccred_server
description: AnonAccred Phase 1 - Anonymous credential system with privacy-by-design architecture for Serverpod. Provides Ed25519-based identity, multi-rail payments, and encrypted data storage without PII.
version: 0.1.0
homepage: https://github.com/your-org/serverpod_anonaccred
repository: https://github.com/your-org/serverpod_anonaccred
issue_tracker: https://github.com/your-org/serverpod_anonaccred/issues
documentation: https://github.com/your-org/serverpod_anonaccred/blob/main/README.md

publish_to: 'https://pub.dev'

topics:
  - serverpod
  - authentication
  - privacy
  - cryptography
  - payments
  - anonymous
  - ed25519

platforms:
  linux:
  macos:
  windows:

environment:
  sdk: '^3.8.0'

dependencies:
  anonaccount_server:
    path: ../anonaccount_server
  serverpod: 3.4.1
  pointycastle: ^4.0.0
  uuid: ^4.5.1
  http: ^1.2.0
  googleapis: ^16.0.0
  googleapis_auth: ^2.0.0
  app_store_server_sdk: ^1.2.10
  dart_jsonwebtoken: ^3.3.1
  crypto: ^3.0.3

dev_dependencies:
  lints: '>=3.0.0 <7.0.0'
  serverpod_test: 3.4.1
  test: ^1.25.5
  webcrypto: ^0.5.3

dependency_overrides:
  # Pin relic_* to 1.1.x. relic_core 1.2.0 added a `Cache` class that
  # collides with serverpod 3.4.1's own `Cache` import inside
  # `lib/src/endpoints/insights.dart`, which breaks any test that
  # transitively imports `package:serverpod/serverpod.dart`. Drop once
  # serverpod ships a release that resolves the conflict.
  relic: '>=1.1.0 <1.2.0'
  relic_core: '>=1.1.0 <1.2.0'
  relic_io: '>=1.1.0 <1.2.0'

