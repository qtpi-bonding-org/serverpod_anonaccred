class: ConsumptionLog
table: consumption_log
fields:
  accountUuid: UuidValue
  entitlementId: int, relation(parent=entitlement)
  amount: double # Always Positive: The quantity consumed
  reason: String # e.g. 'AI_IMAGE_GEN', 'PRO_DAY_DECAY'
  timestamp: DateTime, default=now
indexes:
  account_idx:
    fields: accountUuid
    unique: false
  entitlement_idx:
    fields: entitlementId
    unique: false
